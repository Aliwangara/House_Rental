{% extends 'dashboard/d_layouts/base.html' %}
{% block content %}
<div class="container">
  <h3>{% if form.instance.pk %}Edit{% else %}Add{% endif %} Property</h3>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Save</button>
    <a href="{% url 'property_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
